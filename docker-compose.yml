services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: convite
      MYSQL_USER: convite
      MYSQL_PASSWORD: convite_secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - convite

  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: convite
      DB_PASS: convite_secret
      DB_NAME: convite
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PIX_KEY: ${PIX_KEY:-casamento.epitaciobianca@exemplo.com}
      PORT: 3001
    ports:
      - "8081:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - convite

  seed:
    build: .
    command: node src/serve/seed.js
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: convite
      DB_PASS: convite_secret
      DB_NAME: convite
    depends_on:
      db:
        condition: service_healthy
    networks:
      - convite
    restart: "no"

volumes:
  db_data:

networks:
  convite:
