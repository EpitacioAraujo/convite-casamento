services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dist:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - convite

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./dist:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: convite
      DB_USER: convite
      DB_PASS: convite_secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - convite

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: convite
      MYSQL_USER: convite
      MYSQL_PASSWORD: convite_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - convite

volumes:
  mysql_data:

networks:
  convite:
