# Produção. O fonte fica em {projeto}/code/; este compose é chamado pelo
# ../deploy.sh na raiz do projeto, que lê portas e segredos de ../.env:
#
#   docker compose -p convite --env-file ./.env -f code/docker-compose.prod.yml up -d --build
#
# Um único serviço app (Express serve a SPA + a API). db fica interno.
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - convite

  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PIX_KEY: ${PIX_KEY}
      PORT: 3001
    ports:
      - "${WEB_PORT}:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - convite

volumes:
  db_data:

networks:
  convite:
